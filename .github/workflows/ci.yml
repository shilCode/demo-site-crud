name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json
            e2e/package-lock.json

      - name: Install dependencies
        run: npm run install:all

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Run database migrations
        run: cd server && npx prisma migrate deploy

      - name: Seed database
        run: cd server && node prisma/seed.js

      - name: Build client
        run: cd client && npm run build

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps

      - name: Run E2E tests
        run: cd e2e && npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t demo-site-crud .

      - name: Verify Docker image runs
        run: |
          docker run -d --name test-container -p 4001:4000 demo-site-crud
          sleep 5
          curl -f http://localhost:4001/api/contacts || (docker logs test-container && exit 1)
          docker stop test-container
